<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Course CRUD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/home}">UniFlow</a>
    <nav class="nav-links">
        <a th:href="@{/home}">Home</a>
        <a th:href="@{/admin/courses}">Admin</a>
        <form th:action="@{/logout}" method="post">
            <button class="link-btn" type="submit">Logout</button>
        </form>
    </nav>
</header>

<main class="container">
    <section class="simple-head with-action">
        <div>
            <h1>Quản lý học phần</h1>
            <p>CRUD học phần cho tài khoản ADMIN.</p>
        </div>
        <a class="create-btn" th:href="@{/admin/courses/create}">+ Create Course</a>
    </section>

    <div class="notice success" th:if="${param.created}">Đã tạo học phần mới.</div>
    <div class="notice success" th:if="${param.updated}">Đã cập nhật học phần.</div>
    <div class="notice success" th:if="${param.deleted}">Đã xóa học phần.</div>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Tên học phần</th>
                <th>Tín chỉ</th>
                <th>Giảng viên</th>
                <th>Danh mục</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="course : ${courses}">
                <td th:text="${course.id}">1</td>
                <td th:text="${course.name}">Name</td>
                <td th:text="${course.credits}">3</td>
                <td th:text="${course.lecturer}">Lecturer</td>
                <td th:text="${course.category != null ? course.category.name : 'N/A'}">Category</td>
                <td class="actions">
                    <a th:href="@{'/admin/courses/edit/' + ${course.id}}">Edit</a>
                    <form th:action="@{'/admin/courses/delete/' + ${course.id}}" method="post">
                        <button type="submit" onclick="return confirm('Xóa học phần này?')">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
