<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Courses</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/home}">UniFlow</a>
    <nav class="nav-links">
        <a th:href="@{/home}">Home</a>
        <a th:href="@{/enroll/my-courses}" sec:authorize="hasRole('STUDENT')">My Courses</a>
        <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
            <button class="link-btn" type="submit">Logout</button>
        </form>
    </nav>
</header>

<main class="container">
    <section class="simple-head">
        <h1>Học phần đã đăng ký</h1>
        <p>Danh sách các môn bạn đã enroll theo thời gian gần nhất.</p>
    </section>

    <div class="notice success" th:if="${param.cancelled}">Hủy đăng ký học phần thành công.</div>
    <div class="notice error" th:if="${param.cancelError}">Không thể hủy đăng ký học phần.</div>

    <div class="my-course-list" th:if="${!enrollments.isEmpty()}">
        <article class="my-course-item" th:each="enrollment : ${enrollments}">
            <h3 th:text="${enrollment.course.name}">Course</h3>
            <p><strong>Tín chỉ:</strong> <span th:text="${enrollment.course.credits}">3</span></p>
            <p><strong>Giảng viên:</strong> <span th:text="${enrollment.course.lecturer}">Lecturer</span></p>
            <p><strong>Ngày đăng ký:</strong> <span th:text="${enrollment.enrollDate}">2026-03-23</span></p>
            <form th:action="@{'/enroll/cancel/' + ${enrollment.course.id}}" method="post">
                <button type="submit" class="cancel-btn" onclick="return confirm('Bạn có chắc muốn hủy học phần này?')">Hủy đăng ký</button>
            </form>
        </article>
    </div>

    <div class="empty" th:if="${enrollments.isEmpty()}">Bạn chưa đăng ký học phần nào.</div>
</main>
</body>
</html>
