<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body">
<main class="auth-wrap">
    <section class="auth-panel">
        <h1>Đăng nhập</h1>
        <p>Sử dụng tài khoản sinh viên hoặc đăng nhập Google.</p>

        <div class="notice success" th:if="${param.registered}">Đăng ký thành công. Hãy đăng nhập.</div>
        <div class="notice success" th:if="${param.logout}">Bạn đã đăng xuất.</div>
        <div class="notice error" th:if="${param.error}">Sai username hoặc password.</div>

        <form th:action="@{/login}" method="post" class="auth-form">
            <label>Username
                <input type="text" name="username" required>
            </label>
            <label>Password
                <input type="password" name="password" required>
            </label>
            <button type="submit">Login</button>
        </form>

        <a class="oauth-btn" th:href="@{/oauth2/authorization/google}">Đăng nhập bằng Google</a>

        <p class="switch-link">Chưa có tài khoản? <a th:href="@{/register}">Đăng ký</a></p>
        <p class="switch-link"><a th:href="@{/home}">Về trang Home</a></p>
    </section>
</main>
</body>
</html>
