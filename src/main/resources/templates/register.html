<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body">
<main class="auth-wrap">
    <section class="auth-panel">
        <h1>Đăng ký sinh viên</h1>
        <p>Quyền mặc định sau đăng ký là STUDENT.</p>

        <div class="notice error" th:if="${error}" th:text="${error}">Error</div>

        <form th:action="@{/register}" th:object="${registerRequest}" method="post" class="auth-form">
            <label>Username
                <input type="text" th:field="*{username}" required>
                <small class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></small>
            </label>
            <label>Password
                <input type="password" th:field="*{password}" required>
                <small class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
            </label>
            <label>Email
                <input type="email" th:field="*{email}" required>
                <small class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
            </label>
            <button type="submit">Create Account</button>
        </form>

        <p class="switch-link">Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a></p>
    </section>
</main>
</body>
</html>
